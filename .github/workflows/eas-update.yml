name: EAS Update (OTA)

# JS/asset 변경 시 APK 재배포 없이 Android + iOS 동시 반영
on:
  push:
    branches: [dev]
    paths:
      - 'frontend-rn/**'
      - '!frontend-rn/package.json'
      - '!frontend-rn/app.json'
      - '!frontend-rn/eas.json'
      - '!frontend-rn/ios/**'
      - '!frontend-rn/android/**'

jobs:
  update:
    name: EAS OTA 업데이트 (Android + iOS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-rn/package-lock.json

      - name: 의존성 설치
        working-directory: frontend-rn
        run: npm ci

      - name: EAS CLI 설치
        run: npm install -g eas-cli

      - name: EAS Update
        working-directory: frontend-rn
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas update \
            --channel preview \
            --message "${{ github.event.head_commit.message }}" \
            --non-interactive
