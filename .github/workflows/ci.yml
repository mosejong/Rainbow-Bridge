name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  # ── 변경된 경로 감지 ──────────────────────────────────────────────
  # paths: 필터를 워크플로 트리거에 걸면 docs/frontend PR이
  # "Waiting for status" 상태로 영구 차단됩니다.
  # dorny/paths-filter로 job 단위 필터를 걸어 이 문제를 해결합니다.
  changes:
    name: 변경 경로 감지
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ai: ${{ steps.filter.outputs.ai }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            ai:
              - 'ai/**'
            frontend:
              - 'frontend/**'

  # ── 백엔드 ───────────────────────────────────────────────────────
  # backend/** 변경 시에만 실행. 그 외 PR은 자동 skip → required 통과.
  backend:
    name: 백엔드 검사 (ruff · black · pytest)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: ruff (린트)
        run: ruff check .

      - name: black (포맷 확인)
        run: black --check .

      - name: pytest
        env:
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          MONGO_URI: mongodb://localhost:27017
          MONGO_DB_NAME: rainbow_bridge_test
        run: |
          set +e
          pytest -q
          code=$?
          # exit 5 = 수집된 테스트 없음 → 스모크 테스트 추가 전까지 통과 처리
          if [ "$code" -eq 5 ]; then
            echo "::warning::테스트가 없습니다. backend/tests/ 에 추가해 주세요."
            exit 0
          fi
          exit "$code"

  # ── 프론트엔드 ───────────────────────────────────────────────────
  # frontend/** 변경 시에만 실행. 빌드 성공 여부 검사.
  frontend:
    name: 프론트 빌드 검사
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 빌드
        working-directory: frontend
        run: |
          echo "VITE_API_BASE_URL=http://localhost:8000" > .env
          npm run build

  # ── AI ───────────────────────────────────────────────────────────
  # ai/** 변경 시에만 실행. continue-on-error: true (optional 단계).
  ai:
    name: AI 테스트 (pytest) — optional
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        # chromadb 포함 — memorial/mission/funeral 이 ai.rag.retrieve(→chromadb)를
        # import 하므로 없으면 test 수집 단계에서 ImportError 로 막힘.
        run: pip install pytest httpx openai python-dotenv chromadb

      - name: pytest (ai/llm)
        working-directory: ai
        run: python -m pytest llm/tests/ -q
