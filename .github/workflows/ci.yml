name: CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "backend/**"
      - "ai/**"

jobs:
  # ================================================================
  # 1) 백엔드 — ruff · black · pytest (필수: required status check)
  # ================================================================
  backend:
    name: 백엔드 검사 (ruff · black · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: ruff (린트)
        run: ruff check .

      - name: black (포맷 확인)
        run: black --check .

      - name: pytest
        run: pytest -q

  # ================================================================
  # 2) AI/LLM — pytest (현재 optional, 추후 required 승격 예정)
  # ================================================================
  ai:
    name: AI 테스트 (pytest) — optional
    runs-on: ubuntu-latest
    continue-on-error: true    # 실패해도 머지 차단 안 함 (추후 required 승격)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 기본 의존성 설치 (pytest)
        run: pip install pytest

      - name: pytest (ai/llm)
        working-directory: ai
        run: python -m pytest llm/tests/ -q
