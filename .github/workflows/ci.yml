name: CI

# 백엔드 코드가 바뀐 PR에서만 가볍게 돌립니다 (ruff · black · pytest).
# 지금은 "권장" 단계 — 빨간불이어도 머지를 막지는 않습니다.
# 테스트가 충분히 쌓이면 브랜치 보호의 required status check 로 승격하세요.
on:
  pull_request:
    branches: [dev, main]
    paths:
      - "backend/**"

jobs:
  backend:
    name: 백엔드 검사 (ruff · black · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: ruff (린트)
        run: ruff check .

      - name: black (포맷 확인)
        run: black --check .

      - name: pytest (테스트)
        run: |
          set +e
          pytest -q
          code=$?
          # exit 5 = 수집된 테스트 없음 → 아직 테스트 전이므로 통과 처리
          if [ "$code" -eq 5 ]; then
            echo "::notice::아직 테스트가 없습니다 — 통과 처리합니다."
            exit 0
          fi
          exit "$code"
