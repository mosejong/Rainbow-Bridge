name: EAS Build (Android + iOS)

# package.json, app.json, 네이티브 파일 변경 시에만 전체 재빌드
on:
  push:
    branches: [dev]
    paths:
      - 'frontend-rn/package.json'
      - 'frontend-rn/app.json'
      - 'frontend-rn/eas.json'
      - 'frontend-rn/ios/**'
      - 'frontend-rn/android/**'

jobs:
  build:
    name: EAS 전체 빌드 (Android + iOS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-rn/package-lock.json

      - name: 의존성 설치
        working-directory: frontend-rn
        run: npm ci

      - name: EAS CLI 설치
        run: npm install -g eas-cli

      - name: EAS Build (Android + iOS)
        working-directory: frontend-rn
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform all --profile preview --non-interactive --no-wait
