name: EAS Build (Android APK)

on:
  push:
    branches: [dev]
    paths:
      - 'frontend-rn/**'

jobs:
  build:
    name: EAS Android Preview 빌드
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-rn/package-lock.json

      - name: 의존성 설치
        working-directory: frontend-rn
        run: npm ci

      - name: EAS CLI 설치
        run: npm install -g eas-cli

      - name: EAS 빌드 트리거 (Android APK)
        working-directory: frontend-rn
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive --no-wait
