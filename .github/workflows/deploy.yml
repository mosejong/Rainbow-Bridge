name: Deploy to NCP

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 프론트 환경변수 설정
        run: |
          echo "VITE_API_BASE_URL=https://rainbow-bridge.duckdns.org" > frontend/.env

      - name: 프론트 빌드
        run: |
          cd frontend
          npm ci
          npm run build

      - name: 백엔드 pull + Docker Compose 재배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          port: ${{ secrets.NCP_PORT }}
          script: |
            cd /root/Rainbow-Bridge
            git fetch origin dev
            git reset --hard origin/dev
            systemctl stop rainbow-bridge || true
            systemctl disable rainbow-bridge || true
            cd backend
            docker-compose down --remove-orphans && docker-compose up -d --build

      - name: 프론트 파일 업로드
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          port: ${{ secrets.NCP_PORT }}
          source: "frontend/dist/*"
          target: "/var/www/rainbow-bridge/"
          strip_components: 2
