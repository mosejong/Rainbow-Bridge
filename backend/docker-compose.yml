services:
  mongo:
    image: mongo:7
    container_name: rainbow_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: rainbow_backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      MONGO_URI: mongodb://mongo:27017
    volumes:
      - ../uploads:/app/backend/uploads
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
