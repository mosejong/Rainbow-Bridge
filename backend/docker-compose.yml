services:
  mongo:
    image: mongo:7
    container_name: rainbow_mongo
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rainbow_redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: rainbow_backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      MONGO_URI: mongodb://rainbow_mongo:27017
      REDIS_URL: redis://rainbow_redis:6379
    volumes:
      - ../uploads:/app/backend/uploads
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

volumes:
  mongo_data:
